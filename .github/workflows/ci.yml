name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://fastrep:fastrep_password@localhost:5432/fastrep?schema=public
      JWT_ACCESS_SECRET: ci_only_access_secret_not_used_in_production
      JWT_REFRESH_SECRET: ci_only_refresh_secret_not_used_in_production

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Ensure lint made no changes
        run: git diff --exit-code

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run E2E tests
        run: npm run test:e2e -- --runInBand
